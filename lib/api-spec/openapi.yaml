openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: NexoraHosting API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: user
  - name: services
  - name: products
  - name: billing
  - name: invoices
  - name: tickets
  - name: domains
  - name: knowledgebase
  - name: notifications
  - name: affiliate
  - name: api-tokens
  - name: admin

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailInput"
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Reset email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/2fa/enable:
    post:
      operationId: enable2fa
      tags: [auth]
      responses:
        "200":
          description: 2FA setup data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFactorSetup"

  /auth/2fa/verify:
    post:
      operationId: verify2fa
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorInput"
      responses:
        "200":
          description: 2FA verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/2fa/disable:
    post:
      operationId: disable2fa
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorInput"
      responses:
        "200":
          description: 2FA disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── User Profile ──────────────────────────────────────────────────────────
  /user/profile:
    get:
      operationId: getProfile
      tags: [user]
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateProfile
      tags: [user]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /user/change-password:
    post:
      operationId: changePassword
      tags: [user]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /user/dashboard:
    get:
      operationId: getDashboard
      tags: [user]
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /user/login-history:
    get:
      operationId: getLoginHistory
      tags: [user]
      responses:
        "200":
          description: Login history list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LoginHistory"

  # ── Products (public hosting plans) ──────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      tags: [products]
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  # ── Services (client's active services) ──────────────────────────────────
  /services:
    get:
      operationId: listServices
      tags: [services]
      responses:
        "200":
          description: Client services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"

  /services/{id}:
    get:
      operationId: getService
      tags: [services]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Service detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}/cancel:
    post:
      operationId: cancelService
      tags: [services]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelServiceInput"
      responses:
        "200":
          description: Service cancellation requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /services/order:
    post:
      operationId: orderService
      tags: [services]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderServiceInput"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"

  # ── Billing ───────────────────────────────────────────────────────────────
  /billing/invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      responses:
        "200":
          description: Invoice list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"

  /billing/invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /billing/invoices/{id}/pay:
    post:
      operationId: payInvoice
      tags: [invoices]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayInvoiceInput"
      responses:
        "200":
          description: Payment result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResult"

  /billing/transactions:
    get:
      operationId: listTransactions
      tags: [billing]
      responses:
        "200":
          description: Transaction history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /billing/credit:
    get:
      operationId: getCreditBalance
      tags: [billing]
      responses:
        "200":
          description: Credit balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditBalance"

  /billing/add-credit:
    post:
      operationId: addCredit
      tags: [billing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCreditInput"
      responses:
        "200":
          description: Credit added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResult"

  /billing/refund-request:
    post:
      operationId: requestRefund
      tags: [billing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefundRequestInput"
      responses:
        "201":
          description: Refund request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /billing/coupons/validate:
    post:
      operationId: validateCoupon
      tags: [billing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponValidateInput"
      responses:
        "200":
          description: Coupon info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponResult"

  # ── Support Tickets ───────────────────────────────────────────────────────
  /tickets:
    get:
      operationId: listTickets
      tags: [tickets]
      responses:
        "200":
          description: Ticket list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
    post:
      operationId: createTicket
      tags: [tickets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketInput"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}:
    get:
      operationId: getTicket
      tags: [tickets]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket detail with replies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetail"

  /tickets/{id}/reply:
    post:
      operationId: replyToTicket
      tags: [tickets]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketReplyInput"
      responses:
        "201":
          description: Reply added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketReply"

  /tickets/{id}/close:
    post:
      operationId: closeTicket
      tags: [tickets]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Domains ───────────────────────────────────────────────────────────────
  /domains:
    get:
      operationId: listDomains
      tags: [domains]
      responses:
        "200":
          description: Client domains
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Domain"

  /domains/search:
    get:
      operationId: searchDomain
      tags: [domains]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Domain search result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainSearchResult"

  /domains/{id}:
    get:
      operationId: getDomain
      tags: [domains]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Domain detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Domain"

  /domains/{id}/dns:
    get:
      operationId: getDnsRecords
      tags: [domains]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: DNS records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DnsRecord"
    post:
      operationId: addDnsRecord
      tags: [domains]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DnsRecordInput"
      responses:
        "201":
          description: DNS record added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DnsRecord"

  # ── Knowledgebase ─────────────────────────────────────────────────────────
  /kb/categories:
    get:
      operationId: listKbCategories
      tags: [knowledgebase]
      responses:
        "200":
          description: KB categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KbCategory"

  /kb/articles:
    get:
      operationId: listKbArticles
      tags: [knowledgebase]
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: KB articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KbArticle"

  /kb/articles/{id}:
    get:
      operationId: getKbArticle
      tags: [knowledgebase]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: KB article detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KbArticle"

  # ── Notifications ─────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      responses:
        "200":
          description: All marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Affiliate ─────────────────────────────────────────────────────────────
  /affiliate:
    get:
      operationId: getAffiliateStats
      tags: [affiliate]
      responses:
        "200":
          description: Affiliate stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AffiliateStats"

  /affiliate/referrals:
    get:
      operationId: listReferrals
      tags: [affiliate]
      responses:
        "200":
          description: Referral list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Referral"

  /affiliate/withdraw:
    post:
      operationId: requestAffiliateWithdrawal
      tags: [affiliate]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalInput"
      responses:
        "200":
          description: Withdrawal requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── API Tokens ────────────────────────────────────────────────────────────
  /api-tokens:
    get:
      operationId: listApiTokens
      tags: [api-tokens]
      responses:
        "200":
          description: API tokens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiToken"
    post:
      operationId: createApiToken
      tags: [api-tokens]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiTokenInput"
      responses:
        "201":
          description: API token created (token shown once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiTokenCreated"

  /api-tokens/{id}:
    delete:
      operationId: deleteApiToken
      tags: [api-tokens]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Token deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Public / Homepage ─────────────────────────────────────────────────────
  /public/plans:
    get:
      operationId: listPublicPlans
      tags: [products]
      parameters:
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Public plan listing
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /public/reviews:
    get:
      operationId: listReviews
      tags: [products]
      responses:
        "200":
          description: Customer reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  /public/status:
    get:
      operationId: getNetworkStatus
      tags: [health]
      responses:
        "200":
          description: Network and server status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkStatus"

  # ── Admin ─────────────────────────────────────────────────────────────────
  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      responses:
        "200":
          description: Admin revenue & stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /admin/customers:
    get:
      operationId: listCustomers
      tags: [admin]
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Customer list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerPage"

  /admin/customers/{id}:
    get:
      operationId: getCustomer
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetail"
    patch:
      operationId: updateCustomer
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetail"

  /admin/products:
    get:
      operationId: adminListProducts
      tags: [admin]
      responses:
        "200":
          description: All products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: adminCreateProduct
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /admin/products/{id}:
    patch:
      operationId: adminUpdateProduct
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: adminDeleteProduct
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/services:
    get:
      operationId: adminListServices
      tags: [admin]
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: All services
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServicePage"

  /admin/services/{id}/suspend:
    post:
      operationId: adminSuspendService
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/services/{id}/unsuspend:
    post:
      operationId: adminUnsuspendService
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unsuspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/tickets:
    get:
      operationId: adminListTickets
      tags: [admin]
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: All tickets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketPage"

  /admin/invoices:
    get:
      operationId: adminListInvoices
      tags: [admin]
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: All invoices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoicePage"

  /admin/revenue:
    get:
      operationId: getRevenueChart
      tags: [admin]
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d, 1y]
      responses:
        "200":
          description: Revenue chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueChart"

  /admin/staff:
    get:
      operationId: listStaff
      tags: [admin]
      responses:
        "200":
          description: Staff list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createStaff
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffInput"
      responses:
        "201":
          description: Staff member created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /admin/audit-logs:
    get:
      operationId: listAuditLogs
      tags: [admin]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogPage"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # ── Auth ────────────────────────────────────────────────────────────────
    RegisterInput:
      type: object
      required: [firstName, lastName, email, password]
      properties:
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string }
        password: { type: string }
        phone: { type: string }
        company: { type: string }
        referralCode: { type: string }

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }
        twoFactorCode: { type: string }

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token: { type: string }
        user:
          $ref: "#/components/schemas/User"

    VerifyEmailInput:
      type: object
      required: [token]
      properties:
        token: { type: string }

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email: { type: string }

    ResetPasswordInput:
      type: object
      required: [token, password]
      properties:
        token: { type: string }
        password: { type: string }

    TwoFactorSetup:
      type: object
      required: [qrCode, secret]
      properties:
        qrCode: { type: string }
        secret: { type: string }

    TwoFactorInput:
      type: object
      required: [code]
      properties:
        code: { type: string }

    # ── User ────────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, email, firstName, lastName, role, emailVerified, twoFactorEnabled, createdAt]
      properties:
        id: { type: integer }
        email: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        company: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        role: { type: string, enum: [client, admin, staff] }
        emailVerified: { type: boolean }
        twoFactorEnabled: { type: boolean }
        creditBalance: { type: number }
        country: { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"] }
        createdAt: { type: string }

    UserProfile:
      type: object
      required: [id, email, firstName, lastName]
      properties:
        id: { type: integer }
        email: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        company: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        address1: { type: ["string", "null"] }
        address2: { type: ["string", "null"] }
        city: { type: ["string", "null"] }
        state: { type: ["string", "null"] }
        postcode: { type: ["string", "null"] }
        country: { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"] }

    ProfileUpdate:
      type: object
      properties:
        firstName: { type: string }
        lastName: { type: string }
        company: { type: string }
        phone: { type: string }
        address1: { type: string }
        address2: { type: string }
        city: { type: string }
        state: { type: string }
        postcode: { type: string }
        country: { type: string }

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword: { type: string }
        newPassword: { type: string }

    DashboardSummary:
      type: object
      required: [activeServices, pendingInvoices, openTickets, creditBalance, recentInvoices, recentTickets]
      properties:
        activeServices: { type: integer }
        pendingInvoices: { type: integer }
        openTickets: { type: integer }
        creditBalance: { type: number }
        totalSpend: { type: number }
        recentInvoices:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"
        recentTickets:
          type: array
          items:
            $ref: "#/components/schemas/Ticket"

    LoginHistory:
      type: object
      required: [id, ip, userAgent, status, createdAt]
      properties:
        id: { type: integer }
        ip: { type: string }
        country: { type: ["string", "null"] }
        userAgent: { type: string }
        status: { type: string }
        createdAt: { type: string }

    # ── Products ────────────────────────────────────────────────────────────
    Product:
      type: object
      required: [id, name, category, price, billingCycle, features]
      properties:
        id: { type: integer }
        name: { type: string }
        category:
          type: string
          enum: [shared, reseller, vps, vds, dedicated, minecraft, discord-bot, web, game]
        description: { type: ["string", "null"] }
        price: { type: number }
        setupFee: { type: number }
        billingCycle:
          type: string
          enum: [monthly, quarterly, semi-annual, annual, biennial, triennial, onetime]
        features:
          type: array
          items:
            type: string
        diskSpace: { type: ["string", "null"] }
        bandwidth: { type: ["string", "null"] }
        ram: { type: ["string", "null"] }
        cpu: { type: ["string", "null"] }
        featured: { type: boolean }
        available: { type: boolean }

    ProductInput:
      type: object
      required: [name, category, price, billingCycle, features]
      properties:
        name: { type: string }
        category: { type: string }
        description: { type: string }
        price: { type: number }
        setupFee: { type: number }
        billingCycle: { type: string }
        features:
          type: array
          items:
            type: string
        diskSpace: { type: string }
        bandwidth: { type: string }
        ram: { type: string }
        cpu: { type: string }
        featured: { type: boolean }
        available: { type: boolean }

    # ── Services ────────────────────────────────────────────────────────────
    Service:
      type: object
      required: [id, productId, productName, category, status, domain, nextDueDate, price, billingCycle]
      properties:
        id: { type: integer }
        productId: { type: integer }
        productName: { type: string }
        category: { type: string }
        status:
          type: string
          enum: [active, suspended, cancelled, pending, terminated]
        domain: { type: ["string", "null"] }
        nextDueDate: { type: string }
        price: { type: number }
        billingCycle: { type: string }
        ipAddress: { type: ["string", "null"] }
        username: { type: ["string", "null"] }
        createdAt: { type: string }

    CancelServiceInput:
      type: object
      required: [reason, cancelType]
      properties:
        reason: { type: string }
        cancelType:
          type: string
          enum: [immediate, end-of-term]

    OrderServiceInput:
      type: object
      required: [productId, billingCycle]
      properties:
        productId: { type: integer }
        billingCycle: { type: string }
        domain: { type: string }
        couponCode: { type: string }
        paymentMethod: { type: string }

    OrderResponse:
      type: object
      required: [orderId, invoiceId, totalAmount, status]
      properties:
        orderId: { type: integer }
        invoiceId: { type: integer }
        totalAmount: { type: number }
        status: { type: string }
        paymentUrl: { type: ["string", "null"] }

    ServicePage:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Service"
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }

    # ── Billing ─────────────────────────────────────────────────────────────
    Invoice:
      type: object
      required: [id, number, status, total, dueDate, createdAt, items]
      properties:
        id: { type: integer }
        number: { type: string }
        status:
          type: string
          enum: [draft, unpaid, paid, overdue, cancelled, refunded]
        subtotal: { type: number }
        tax: { type: number }
        total: { type: number }
        currency: { type: string }
        dueDate: { type: string }
        paidAt: { type: ["string", "null"] }
        createdAt: { type: string }
        items:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceItem"
        notes: { type: ["string", "null"] }

    InvoiceItem:
      type: object
      required: [id, description, amount, quantity]
      properties:
        id: { type: integer }
        description: { type: string }
        amount: { type: number }
        quantity: { type: integer }

    PayInvoiceInput:
      type: object
      required: [paymentMethod]
      properties:
        paymentMethod:
          type: string
          enum: [stripe, paypal, razorpay, crypto, credit]

    PaymentResult:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }
        redirectUrl: { type: ["string", "null"] }
        transactionId: { type: ["string", "null"] }

    Transaction:
      type: object
      required: [id, type, amount, description, status, createdAt]
      properties:
        id: { type: integer }
        type:
          type: string
          enum: [payment, refund, credit, debit, fee]
        amount: { type: number }
        description: { type: string }
        status:
          type: string
          enum: [completed, pending, failed]
        invoiceId: { type: ["integer", "null"] }
        paymentMethod: { type: ["string", "null"] }
        gateway: { type: ["string", "null"] }
        createdAt: { type: string }

    CreditBalance:
      type: object
      required: [balance, currency]
      properties:
        balance: { type: number }
        currency: { type: string }

    AddCreditInput:
      type: object
      required: [amount, paymentMethod]
      properties:
        amount: { type: number }
        paymentMethod: { type: string }

    RefundRequestInput:
      type: object
      required: [invoiceId, reason]
      properties:
        invoiceId: { type: integer }
        reason: { type: string }
        amount: { type: number }

    CouponValidateInput:
      type: object
      required: [code]
      properties:
        code: { type: string }
        productId: { type: integer }

    CouponResult:
      type: object
      required: [valid, code]
      properties:
        valid: { type: boolean }
        code: { type: string }
        discountType: { type: ["string", "null"] }
        discountValue: { type: ["number", "null"] }
        description: { type: ["string", "null"] }

    InvoicePage:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }

    # ── Tickets ─────────────────────────────────────────────────────────────
    Ticket:
      type: object
      required: [id, subject, category, priority, status, createdAt, updatedAt]
      properties:
        id: { type: integer }
        subject: { type: string }
        category:
          type: string
          enum: [billing, technical, sales, general, abuse]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        status:
          type: string
          enum: [open, pending, answered, closed]
        serviceId: { type: ["integer", "null"] }
        assignedTo: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }

    TicketDetail:
      type: object
      required: [id, subject, category, priority, status, createdAt, updatedAt, replies]
      properties:
        id: { type: integer }
        subject: { type: string }
        category: { type: string }
        priority: { type: string }
        status: { type: string }
        serviceId: { type: ["integer", "null"] }
        assignedTo: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }
        replies:
          type: array
          items:
            $ref: "#/components/schemas/TicketReply"

    TicketInput:
      type: object
      required: [subject, category, priority, message]
      properties:
        subject: { type: string }
        category: { type: string }
        priority: { type: string }
        message: { type: string }
        serviceId: { type: integer }

    TicketReply:
      type: object
      required: [id, message, senderType, senderName, createdAt]
      properties:
        id: { type: integer }
        message: { type: string }
        senderType:
          type: string
          enum: [client, staff]
        senderName: { type: string }
        attachments:
          type: array
          items:
            type: string
        createdAt: { type: string }

    TicketReplyInput:
      type: object
      required: [message]
      properties:
        message: { type: string }

    TicketPage:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Ticket"
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }

    # ── Domains ─────────────────────────────────────────────────────────────
    Domain:
      type: object
      required: [id, name, tld, status, expiryDate, autoRenew]
      properties:
        id: { type: integer }
        name: { type: string }
        tld: { type: string }
        status:
          type: string
          enum: [active, expired, pending, transferring, cancelled]
        expiryDate: { type: string }
        registeredDate: { type: string }
        autoRenew: { type: boolean }
        privacyProtection: { type: boolean }
        nameservers:
          type: array
          items:
            type: string

    DomainSearchResult:
      type: object
      required: [domain, results]
      properties:
        domain: { type: string }
        results:
          type: array
          items:
            type: object
            required: [tld, available, price]
            properties:
              tld: { type: string }
              available: { type: boolean }
              price: { type: number }
              renewalPrice: { type: number }

    DnsRecord:
      type: object
      required: [id, type, name, content, ttl]
      properties:
        id: { type: integer }
        type:
          type: string
          enum: [A, AAAA, CNAME, MX, TXT, NS, SRV]
        name: { type: string }
        content: { type: string }
        ttl: { type: integer }
        priority: { type: ["integer", "null"] }

    DnsRecordInput:
      type: object
      required: [type, name, content, ttl]
      properties:
        type: { type: string }
        name: { type: string }
        content: { type: string }
        ttl: { type: integer }
        priority: { type: integer }

    # ── Knowledgebase ────────────────────────────────────────────────────────
    KbCategory:
      type: object
      required: [id, name, articleCount]
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: ["string", "null"] }
        icon: { type: ["string", "null"] }
        articleCount: { type: integer }

    KbArticle:
      type: object
      required: [id, title, categoryId, excerpt, createdAt]
      properties:
        id: { type: integer }
        title: { type: string }
        categoryId: { type: integer }
        categoryName: { type: string }
        excerpt: { type: string }
        content: { type: ["string", "null"] }
        tags:
          type: array
          items:
            type: string
        viewCount: { type: integer }
        createdAt: { type: string }
        updatedAt: { type: string }

    # ── Notifications ────────────────────────────────────────────────────────
    Notification:
      type: object
      required: [id, title, message, type, read, createdAt]
      properties:
        id: { type: integer }
        title: { type: string }
        message: { type: string }
        type:
          type: string
          enum: [invoice, ticket, service, system, promotion]
        read: { type: boolean }
        link: { type: ["string", "null"] }
        createdAt: { type: string }

    # ── Affiliate ────────────────────────────────────────────────────────────
    AffiliateStats:
      type: object
      required: [referralCode, referralLink, totalReferrals, totalEarnings, pendingEarnings, paidEarnings]
      properties:
        referralCode: { type: string }
        referralLink: { type: string }
        totalReferrals: { type: integer }
        totalEarnings: { type: number }
        pendingEarnings: { type: number }
        paidEarnings: { type: number }
        commissionRate: { type: number }

    Referral:
      type: object
      required: [id, email, status, earnings, createdAt]
      properties:
        id: { type: integer }
        email: { type: string }
        status:
          type: string
          enum: [pending, active, converted]
        earnings: { type: number }
        createdAt: { type: string }

    WithdrawalInput:
      type: object
      required: [amount, method]
      properties:
        amount: { type: number }
        method: { type: string }
        details: { type: string }

    # ── API Tokens ────────────────────────────────────────────────────────────
    ApiToken:
      type: object
      required: [id, name, prefix, permissions, lastUsed, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        prefix: { type: string }
        permissions:
          type: array
          items:
            type: string
        lastUsed: { type: ["string", "null"] }
        expiresAt: { type: ["string", "null"] }
        createdAt: { type: string }

    ApiTokenInput:
      type: object
      required: [name, permissions]
      properties:
        name: { type: string }
        permissions:
          type: array
          items:
            type: string
        expiresAt: { type: string }

    ApiTokenCreated:
      type: object
      required: [id, name, token, prefix, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        token: { type: string }
        prefix: { type: string }
        createdAt: { type: string }

    # ── Public ────────────────────────────────────────────────────────────────
    Review:
      type: object
      required: [id, author, rating, content, service, createdAt]
      properties:
        id: { type: integer }
        author: { type: string }
        avatarUrl: { type: ["string", "null"] }
        rating: { type: integer }
        content: { type: string }
        service: { type: string }
        country: { type: ["string", "null"] }
        createdAt: { type: string }

    NetworkStatus:
      type: object
      required: [overall, services, lastChecked]
      properties:
        overall:
          type: string
          enum: [operational, degraded, outage]
        services:
          type: array
          items:
            type: object
            required: [name, status, uptimePercent]
            properties:
              name: { type: string }
              status:
                type: string
                enum: [operational, degraded, outage, maintenance]
              uptimePercent: { type: number }
              responseTime: { type: ["integer", "null"] }
        lastChecked: { type: string }

    # ── Admin ────────────────────────────────────────────────────────────────
    AdminDashboard:
      type: object
      required: [totalRevenue, monthlyRevenue, activeServices, totalCustomers, openTickets, unpaidInvoices, newCustomersThisMonth, revenueGrowth]
      properties:
        totalRevenue: { type: number }
        monthlyRevenue: { type: number }
        activeServices: { type: integer }
        totalCustomers: { type: integer }
        openTickets: { type: integer }
        unpaidInvoices: { type: integer }
        newCustomersThisMonth: { type: integer }
        revenueGrowth: { type: number }
        topProducts:
          type: array
          items:
            type: object
            required: [name, count, revenue]
            properties:
              name: { type: string }
              count: { type: integer }
              revenue: { type: number }
        recentActivity:
          type: array
          items:
            type: object
            required: [type, description, time]
            properties:
              type: { type: string }
              description: { type: string }
              time: { type: string }

    CustomerPage:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }

    CustomerDetail:
      type: object
      required: [id, email, firstName, lastName, role, emailVerified, createdAt, services, invoices, tickets]
      properties:
        id: { type: integer }
        email: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        company: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        role: { type: string }
        emailVerified: { type: boolean }
        creditBalance: { type: number }
        createdAt: { type: string }
        services:
          type: array
          items:
            $ref: "#/components/schemas/Service"
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"
        tickets:
          type: array
          items:
            $ref: "#/components/schemas/Ticket"

    CustomerUpdate:
      type: object
      properties:
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string }
        company: { type: string }
        phone: { type: string }
        creditBalance: { type: number }
        role: { type: string }

    RevenueChart:
      type: object
      required: [period, data, total]
      properties:
        period: { type: string }
        total: { type: number }
        data:
          type: array
          items:
            type: object
            required: [date, revenue, count]
            properties:
              date: { type: string }
              revenue: { type: number }
              count: { type: integer }

    StaffMember:
      type: object
      required: [id, email, firstName, lastName, role, createdAt]
      properties:
        id: { type: integer }
        email: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        role: { type: string }
        permissions:
          type: array
          items:
            type: string
        createdAt: { type: string }

    StaffInput:
      type: object
      required: [email, firstName, lastName, password, role]
      properties:
        email: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        password: { type: string }
        role: { type: string }
        permissions:
          type: array
          items:
            type: string

    AuditLogPage:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          items:
            type: object
            required: [id, userId, action, target, ip, createdAt]
            properties:
              id: { type: integer }
              userId: { type: integer }
              userEmail: { type: string }
              action: { type: string }
              target: { type: string }
              ip: { type: string }
              details: { type: ["string", "null"] }
              createdAt: { type: string }
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }
